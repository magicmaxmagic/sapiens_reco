version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/optimus}
      - AUTH_REQUIRED=${AUTH_REQUIRED:-true}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-AdminPass123}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-prod}
      - AUTO_CREATE_TABLES=${AUTO_CREATE_TABLES:-true}
      - APP_ENV=${APP_ENV:-development}
    depends_on:
      - db
    networks:
      - optimus-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - optimus-network

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=optimus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - optimus-network

networks:
  optimus-network:
    driver: bridge

volumes:
  postgres_data: