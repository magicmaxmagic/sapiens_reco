version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: optimus-postgres
    environment:
      POSTGRES_DB: optimus
      POSTGRES_USER: optimus
      POSTGRES_PASSWORD: optimus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optimus -d optimus"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
