name: Deploy Backend to Vercel

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/vercel-backend-deploy.yml"
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: optimus
          POSTGRES_USER: optimus
          POSTGRES_PASSWORD: optimus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U optimus -d optimus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    concurrency:
      group: vercel-backend-production
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check app tests

      - name: Alembic upgrade
        env:
          DATABASE_URL: postgresql+psycopg://optimus:optimus@localhost:5432/optimus
        run: alembic upgrade head

      - name: Tests
        env:
          DATABASE_URL: postgresql+psycopg://optimus:optimus@localhost:5432/optimus
          AUTO_CREATE_TABLES: "true"
        run: pytest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Validate Vercel secrets
        run: |
          set -euo pipefail
          [[ -n "${VERCEL_TOKEN:-}" ]] || { echo "::error::Missing secret VERCEL_TOKEN"; exit 1; }
          [[ -n "${VERCEL_ORG_ID:-}" ]] || { echo "::error::Missing secret VERCEL_ORG_ID"; exit 1; }
          [[ -n "${VERCEL_PROJECT_ID:-}" ]] || { echo "::error::Missing secret VERCEL_BACKEND_PROJECT_ID"; exit 1; }

      - name: Pull Vercel Production Environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Project Artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
