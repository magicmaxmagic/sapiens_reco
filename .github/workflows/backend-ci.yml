name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: optimus
          POSTGRES_USER: optimus
          POSTGRES_PASSWORD: optimus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U optimus -d optimus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check app tests

      - name: Alembic upgrade
        env:
          DATABASE_URL: postgresql+psycopg://optimus:optimus@localhost:5432/optimus
        run: alembic upgrade head

      - name: Tests
        env:
          DATABASE_URL: postgresql+psycopg://optimus:optimus@localhost:5432/optimus
          AUTO_CREATE_TABLES: "true"
        run: pytest
