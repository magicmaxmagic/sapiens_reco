name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main, uat]
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: optimus
          POSTGRES_USER: optimus
          POSTGRES_PASSWORD: optimus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U optimus -d optimus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Test Supabase DB connectivity
        if: ${{ secrets.SUPABASE_DATABASE_URL != '' || secrets.DATABASE_URL != '' || secrets.POSTGRES_URL_NON_POOLING != '' }}
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL || secrets.DATABASE_URL || secrets.POSTGRES_URL_NON_POOLING }}
        run: |
          python - <<'PY'
          import os, sys
          from sqlalchemy import create_engine, text

          url = os.environ.get('SUPABASE_DATABASE_URL')
          if not url:
              print('No Supabase DB URL provided.')
              sys.exit(1)

          # Normalize popular postgres URI shorthands
          if url.startswith('postgres://'):
              url = url.replace('postgres://', 'postgresql+psycopg://', 1)

          try:
              engine = create_engine(url, connect_args={"connect_timeout": 5})
              with engine.connect() as conn:
                  conn.execute(text('select 1'))
              print('Supabase DB connection OK')
          except Exception as exc:
              print('Supabase DB connection FAILED:', exc)
              raise
          PY

      - name: Ruff
        run: ruff check app tests

      - name: Alembic upgrade
        env:
          DATABASE_URL: postgresql+psycopg://optimus:optimus@localhost:5432/optimus
        run: alembic upgrade head

      - name: Tests + Coverage
        env:
          DATABASE_URL: postgresql+psycopg://optimus:optimus@localhost:5432/optimus
          AUTO_CREATE_TABLES: "true"
        run: pytest --cov=app --cov-report=term-missing
